name: Download Bing Daily Image

on:
  schedule:
    # UTC 00:30 = 北京时间 08:30，每日执行，微软每日一图在北京时间8点更新
    - cron: "30 0 * * *"
  workflow_dispatch:  # 允许手动触发

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install requests

      - name: Run download script
        run: python download_bing_image.py
        
      - name: Run download img_json_data
        run: python download_bing_json_cn.py

      - name: Run download img_json_data_internation
        run: python download_bing_json_internation.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Add daily Bing image"
          git push
